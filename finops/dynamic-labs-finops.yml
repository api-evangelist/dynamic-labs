description: >-
  FinOps view of Dynamic spend. Dynamic bills primarily on Monthly Active Users
  (MAU) with a subscription plus per-additional-MAU overage on the Advanced plan,
  and meters embedded wallets on Monthly Active Wallets (MAW). Webhooks, allowlists,
  and analytics are included with paid tiers, while Enterprise pricing is
  custom-negotiated. Cost drivers are dominated by active-user and active-wallet
  counts rather than raw API call volume.
notes: >-
  MAU/MAW allowances and overage rates change; verify against the Dynamic pricing
  page during reconciliation. Amounts are represented as meters and drivers rather
  than fixed rates where not reliably confirmed.
