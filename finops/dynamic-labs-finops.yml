meters:
- name: monthly_active_users
  description: Distinct users authenticated into an environment in the billing month; the primary cost driver.
  unit: users
  aggregation: distinct_count
  dimensions:
  - account
  - environment
- name: monthly_active_wallets
  description: Distinct embedded wallets active in the billing month, metered on the Advanced plan.
  unit: wallets
  aggregation: distinct_count
  dimensions:
  - account
  - environment
  - chain
- name: subscription_fee
  description: Recurring monthly subscription fee for the Advanced plan.
  unit: months
  aggregation: sum
  dimensions:
  - account
- name: embedded_wallet_operations
  description: MPC-TSS signing and provisioning operations, where separately metered.
  unit: operations
  aggregation: sum
  dimensions:
  - account
  - environment
principles:
- name: Visibility
  description: Track MAU and MAW per environment; separate sandbox from live so test traffic is not mistaken for billable usage.
- name: Allocation
  description: Use distinct environments (projects) per app/team and tag API tokens to map spend to cost centers.
- name: Optimization
  description: Consolidate low-traffic apps, retire dormant environments, and right-size the plan tier against actual MAU/MAW.
- name: Accountability
  description: Assign an owner per environment and review MAU/MAW growth monthly against budget and overage thresholds.
