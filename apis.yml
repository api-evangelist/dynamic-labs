aid: dynamic-labs
url: https://raw.githubusercontent.com/api-evangelist/dynamic-labs/refs/heads/main/apis.yml
name: Dynamic
kind: company
description: Dynamic is a web3 authentication and embedded wallet platform. It provides
  multi-chain login, embedded and smart wallets secured with MPC-TSS, onramps, and
  end-to-end user management through a developer dashboard, client SDKs, and an
  environment-scoped REST API for programmatically managing users, wallets, projects,
  webhooks, and token verification.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Web3
- Authentication
- Embedded Wallets
- Wallets
- MPC
- Onboarding
- Crypto
